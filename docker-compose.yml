services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cirt_badge}
      MYSQL_USER: ${MYSQL_USER:-cirt}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-cirtpass}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-cirt}:${MYSQL_PASSWORD:-cirtpass}@mysql:3306/${MYSQL_DATABASE:-cirt_badge}
    ports:
      - "${APP_PORT:-3330}:3330"
    volumes:
      - uploads_data:/app/uploads

volumes:
  mysql_data:
  uploads_data:
